<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Director Comercial</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px}
h1{text-align:center}
.container{display:grid;grid-template-columns:repeat(6,1fr);gap:15px;margin-bottom:20px}
.card{background:#1e293b;padding:15px;border-radius:12px;text-align:center}
.green{color:#22c55e}
.yellow{color:#eab308}
.red{color:#ef4444}
canvas{background:white;border-radius:10px;margin-top:20px}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{padding:10px;text-align:center}
th{background:#1e293b}
tr:nth-child(even){background:#1e293b}
select,button{padding:8px;border-radius:5px;margin:5px;border:none}
button{background:#1e293b;color:white;cursor:pointer}
</style>
</head>

<body>

<h1>📊 Dashboard Director Comercial</h1>

<input type="file" id="fileInput" accept=".xlsx" />

<div>
<select id="filtroSupervisor"></select>
<select id="filtroAsesor"></select>

<button onclick="filtrarTipo('todos')">Todos</button>
<button onclick="filtrarTipo('top')">Top</button>
<button onclick="filtrarTipo('criticos')">Críticos</button>
<button onclick="filtrarTipo('crecimiento')">Crecimiento</button>
</div>

<div class="container">
<div class="card"><div>Total Abril</div><div id="total"></div></div>
<div class="card"><div>Total Marzo</div><div id="marzo"></div></div>
<div class="card"><div>Variación %</div><div id="variacion"></div></div>
<div class="card"><div>Promedio</div><div id="promedio"></div></div>
<div class="card"><div>Estado</div><div id="estado"></div></div>
<div class="card"><div>Prod Nuevos</div><div id="prodNuevos"></div></div>
<div class="card"><div>Prod Antiguos</div><div id="prodAntiguos"></div></div>
</div>

<canvas id="variacionSup"></canvas>
<canvas id="proyeccionSup"></canvas>

<h2>🚨 Alertas</h2>
<ul id="alertas"></ul>

<h2>📋 Ranking</h2>
<table>
<thead>
<tr>
<th>Asesor</th>
<th>Supervisor</th>
<th>Marzo</th>
<th>Abril</th>
<th>%</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script>

let dataGlobal=[];

// ==================== UTIL ====================
function numeroSeguro(valor){
    if(valor===null||valor===undefined||valor==="") return 0;
    return Number(valor.toString().replace(",", "").trim())||0;
}

// ==================== CARGA ====================
document.getElementById('fileInput').addEventListener('change', function(e){

let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);
let wb=XLSX.read(data,{type:'array'});

let hoja=wb.Sheets[wb.SheetNames[0]];
let json=XLSX.utils.sheet_to_json(hoja);

dataGlobal=json.map(f=>{

let marzo=numeroSeguro(f.Marzo||f.MARZO);
let abril=numeroSeguro(f.Abril||f.ABRIL);

let varr=abril-marzo;
let porc=marzo>0?(varr/marzo)*100:0;

return{
n:f.Nombre,
s:f.Supervisor,
marzo,
abril,
fecha:f["Fecha Ingreso"]||f["FECHA INGRESO"],
variacion:varr,
porc:porc
}
});

render(dataGlobal);
crearFiltros();

};

reader.readAsArrayBuffer(file);

});

// ==================== RENDER ====================
function render(data){
tabla(data);
kpis(data);
graficos(data);
alertas(data);
antiguedad(data);
}

// ==================== KPIS ====================
function kpis(data){

let tA=data.reduce((a,b)=>a+b.abril,0);
let tM=data.reduce((a,b)=>a+b.marzo,0);

let varr=tA-tM;
let porc=tM>0?(varr/tM)*100:0;

document.getElementById("total").innerText=tA;
document.getElementById("marzo").innerText=tM;
document.getElementById("variacion").innerHTML=`<span class="${porc>=0?'green':'red'}">${porc.toFixed(1)}%</span>`;
document.getElementById("promedio").innerText=Math.round(tA/data.length);

document.getElementById("estado").innerHTML=porc>=0?"<span class='green'>Crecimiento</span>":"<span class='red'>Caída</span>";

}

// ==================== TABLA ====================
function tabla(data){

let tbody=document.getElementById("tabla");
tbody.innerHTML="";

data.sort((a,b)=>b.abril-a.abril);

data.forEach(a=>{
let c=a.porc<0?"red":"green";

tbody.innerHTML+=`<tr>
<td>${a.n}</td>
<td>${a.s}</td>
<td>${a.marzo}</td>
<td>${a.abril}</td>
<td class="${c}">${a.porc.toFixed(1)}%</td>
</tr>`;
});

}

// ==================== ANTIGUEDAD + ALERTA ====================
function antiguedad(data){

let hoy=new Date();
let dia=hoy.getDate();
let diasMes=30;

let nuevos=[],antiguos=[];

data.forEach(a=>{

if(!a.fecha)return;

let fecha;

// Excel número
if(typeof a.fecha==="number"){
fecha=new Date((a.fecha-25569)*86400*1000);
}

// dd/mm/yyyy
else if(typeof a.fecha==="string" && a.fecha.includes("/")){
let p=a.fecha.split("/");
fecha=new Date(p[2],p[1]-1,p[0]);
}

else{
fecha=new Date(a.fecha);
}

if(isNaN(fecha))return;

let meses=(hoy-fecha)/(1000*60*60*24*30);

let proy=(a.abril/dia)*diasMes;

let obj={...a,proy};

if(meses<=3)nuevos.push(obj);
else antiguos.push(obj);

});

// ================= ALERTAS ESTRUCTURA =================
let ul=document.getElementById("alertas");

// 🚨 SIN NUEVOS
if(nuevos.length===0){
ul.innerHTML+=`<li class="red">🚨 No hay asesores nuevos (0-3 meses)</li>`;
}

// ⚠️ ONBOARDING DÉBIL
let pn=nuevos.length?nuevos.reduce((a,b)=>a+b.proy,0)/nuevos.length:0;
let pa=antiguos.length?antiguos.reduce((a,b)=>a+b.proy,0)/antiguos.length:0;

if(nuevos.length>0 && pn < pa*0.6){
ul.innerHTML+=`<li class="yellow">⚠️ Onboarding débil: nuevos rinden mucho menos</li>`;
}

// KPIs
document.getElementById("prodNuevos").innerText=Math.round(pn);
document.getElementById("prodAntiguos").innerText=Math.round(pa);

}

// ==================== GRAFICOS ====================
function graficos(data){

let res={};

data.forEach(a=>{
if(!res[a.s])res[a.s]={marzo:0,abril:0};
res[a.s].marzo+=a.marzo;
res[a.s].abril+=a.abril;
});

let labels=Object.keys(res);

new Chart(document.getElementById('variacionSup'),{
type:'bar',
data:{labels:labels,datasets:[{
label:'Variación %',
data:labels.map(s=>{
let m=res[s].marzo,a=res[s].abril;
return m>0?((a-m)/m)*100:0;
})
}]}
});

new Chart(document.getElementById('proyeccionSup'),{
type:'bar',
data:{labels:labels,datasets:[{
label:'Proyección Abril',
data:labels.map(s=>{
let d=res[s].abril/15;
return Math.round(d*30);
})
}]}
});

}

// ==================== ALERTAS BASE ====================
function alertas(data){

let ul=document.getElementById("alertas");
ul.innerHTML="";

data.forEach(a=>{
if(a.porc<-20)ul.innerHTML+=`<li class="red">🚨 ${a.n} (${a.porc.toFixed(1)}%)</li>`;
else if(a.porc<0)ul.innerHTML+=`<li class="yellow">⚠️ ${a.n} (${a.porc.toFixed(1)}%)</li>`;
});

}

// ==================== FILTROS ====================
function crearFiltros(){

let sup=[...new Set(dataGlobal.map(a=>a.s))];
let ase=[...new Set(dataGlobal.map(a=>a.n))];

let s=document.getElementById("filtroSupervisor");
let a=document.getElementById("filtroAsesor");

s.innerHTML="<option value=''>Supervisor</option>";
a.innerHTML="<option value=''>Asesor</option>";

sup.forEach(x=>s.innerHTML+=`<option>${x}</option>`);
ase.forEach(x=>a.innerHTML+=`<option>${x}</option>`);

s.onchange=aplicarFiltros;
a.onchange=aplicarFiltros;

}

function aplicarFiltros(){

let sup=document.getElementById("filtroSupervisor").value;
let ase=document.getElementById("filtroAsesor").value;

let f=dataGlobal.filter(x=>(!sup||x.s===sup)&&(!ase||x.n===ase));

render(f);

}

// ==================== BOTONES ====================
function filtrarTipo(tipo){

let d=[...dataGlobal];

if(tipo==="top")d=d.filter(a=>a.porc>10);
if(tipo==="criticos")d=d.filter(a=>a.porc<-10);
if(tipo==="crecimiento")d=d.filter(a=>a.porc>0);

render(d);

}

</script>

</body>
</html>
