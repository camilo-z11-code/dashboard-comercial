<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Director Comercial</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px}
h1{text-align:center}

.container{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;margin-bottom:20px}

.card{background:#1e293b;padding:15px;border-radius:12px;text-align:center}

.green{color:#22c55e}
.yellow{color:#eab308}
.red{color:#ef4444}

canvas{background:white;border-radius:10px;margin-top:20px}

table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{padding:10px;text-align:center}
th{background:#1e293b}
tr:nth-child(even){background:#1e293b}

select{padding:8px;margin-right:10px;border-radius:5px}
</style>
</head>

<body>

<h1>📊 Dashboard Director Comercial</h1>

<input type="file" id="fileInput" accept=".xlsx" />

<div style="margin:20px 0;">
<select id="filtroSupervisor"></select>
<select id="filtroAsesor"></select>
</div>

<div class="container">
<div class="card"><div>Total Abril</div><div id="total"></div></div>
<div class="card"><div>Total Marzo</div><div id="marzo"></div></div>
<div class="card"><div>Variación</div><div id="variacion"></div></div>
<div class="card"><div>Promedio</div><div id="promedio"></div></div>
<div class="card"><div>Estado</div><div id="estado"></div></div>
</div>

<canvas id="variacionSup"></canvas>
<canvas id="proyeccionSup"></canvas>

<h2>🚨 Alertas críticas</h2>
<ul id="alertas"></ul>

<h2>📋 Ranking</h2>
<table>
<thead>
<tr>
<th>Asesor</th>
<th>Supervisor</th>
<th>Marzo</th>
<th>Abril</th>
<th>Variación</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script>

let asesores = [];

// ==================== CARGA EXCEL ====================
document.getElementById('fileInput').addEventListener('change', function(e) {

    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(e) {

        let data = new Uint8Array(e.target.result);
        let workbook = XLSX.read(data, {type: 'array'});

        let hoja = workbook.Sheets[workbook.SheetNames[0]];
        let json = XLSX.utils.sheet_to_json(hoja);

        asesores = json.map(f => ({
            n: f.Nombre,
            s: f.Supervisor,
            marzo: parseInt(f.Marzo),
            abril: parseInt(f.Abril),
            variacion: parseInt(f.Abril) - parseInt(f.Marzo)
        }));

        actualizarTodo(asesores);

    };

    reader.readAsArrayBuffer(file);
});

// ==================== CORE ====================
function actualizarTodo(data){
    cargarTabla(data);
    analisisGeneral(data);
    graficos(data);
    alertas(data);
    crearFiltros();
}

// ==================== TABLA ====================
function cargarTabla(data){
    let tbody = document.getElementById("tabla");
    tbody.innerHTML = "";

    data.sort((a,b)=>b.abril-a.abril);

    data.forEach(a=>{
        let color = a.variacion < 0 ? "red" : "green";

        tbody.innerHTML += `
        <tr>
        <td>${a.n}</td>
        <td>${a.s}</td>
        <td>${a.marzo}</td>
        <td>${a.abril}</td>
        <td class="${color}">${a.variacion}</td>
        </tr>`;
    });
}

// ==================== KPIs ====================
function analisisGeneral(data){

    let totalAbril = data.reduce((a,b)=>a+b.abril,0);
    let totalMarzo = data.reduce((a,b)=>a+b.marzo,0);

    let variacion = totalAbril - totalMarzo;

    let variacionPorc = totalMarzo > 0 
        ? ((variacion / totalMarzo) * 100).toFixed(1)
        : 0;

    document.getElementById("total").innerText = totalAbril;
    document.getElementById("marzo").innerText = totalMarzo;

    let color = variacion >= 0 ? "green" : "red";
    document.getElementById("variacion").innerHTML = `<span class="${color}">${variacionPorc}%</span>`;

    let prom = Math.round(totalAbril / data.length);
    document.getElementById("promedio").innerText = prom;

    let estado = document.getElementById("estado");

    if(variacion > 0) estado.innerHTML="<span class='green'>Crecimiento</span>";
    else estado.innerHTML="<span class='red'>Caída</span>";
}

// ==================== GRAFICOS ====================
function graficos(data){

    let resumen = {};

    data.forEach(a=>{
        if(!resumen[a.s]){
            resumen[a.s] = {marzo:0, abril:0}
        }
        resumen[a.s].marzo += a.marzo;
        resumen[a.s].abril += a.abril;
    });

    let labels = Object.keys(resumen);

    new Chart(document.getElementById('variacionSup'),{
        type:'bar',
        data:{
            labels:labels,
            datasets:[{
                label:'Variación por Supervisor',
                data:labels.map(s=>resumen[s].abril - resumen[s].marzo)
            }]
        }
    });

    new Chart(document.getElementById('proyeccionSup'),{
        type:'bar',
        data:{
            labels:labels,
            datasets:[{
                label:'Proyección Abril',
                data:labels.map(s=>{
                    let diaria = resumen[s].abril / 15;
                    return Math.round(diaria * 30);
                })
            }]
        }
    });
}

// ==================== ALERTAS ====================
function alertas(data){

    let ul = document.getElementById("alertas");
    ul.innerHTML = "";

    data.forEach(a=>{
        if(a.variacion < -10){
            ul.innerHTML += `<li class="red">🚨 ${a.n} caída fuerte (${a.variacion})</li>`;
        } 
        else if(a.variacion < 0){
            ul.innerHTML += `<li class="yellow">⚠️ ${a.n} en descenso (${a.variacion})</li>`;
        }
    });
}

// ==================== FILTROS ====================
function crearFiltros(){

    let supSelect = document.getElementById("filtroSupervisor");
    let aseSelect = document.getElementById("filtroAsesor");

    let supervisores = [...new Set(asesores.map(a=>a.s))];
    let ases = [...new Set(asesores.map(a=>a.n))];

    supSelect.innerHTML = "<option value=''>Todos los supervisores</option>";
    aseSelect.innerHTML = "<option value=''>Todos los asesores</option>";

    supervisores.forEach(s=>{
        supSelect.innerHTML += `<option value="${s}">${s}</option>`;
    });

    ases.forEach(a=>{
        aseSelect.innerHTML += `<option value="${a}">${a}</option>`;
    });

    supSelect.onchange = aplicarFiltros;
    aseSelect.onchange = aplicarFiltros;
}

function aplicarFiltros(){

    let sup = document.getElementById("filtroSupervisor").value;
    let ase = document.getElementById("filtroAsesor").value;

    let filtrados = asesores.filter(a=>{
        return (!sup || a.s === sup) && (!ase || a.n === ase);
    });

    actualizarTodo(filtrados);
}

</script>

</body>
</html>
