<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Power BI Comercial</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px}
h1{text-align:center}

.container{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;margin-bottom:20px}

.card{background:#1e293b;padding:15px;border-radius:12px;text-align:center}

.green{color:#22c55e}
.yellow{color:#eab308}
.red{color:#ef4444}

canvas{background:white;border-radius:10px;margin-top:20px}

table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{padding:10px;text-align:center}
th{background:#1e293b}
tr:nth-child(even){background:#1e293b}

select, button{padding:8px;border-radius:5px;margin-right:5px;border:none;cursor:pointer}
button{background:#1e293b;color:white}
button:hover{background:#334155}
</style>
</head>

<body>

<h1>📊 Dashboard Comercial - Modo Power BI</h1>

<input type="file" id="fileInput" accept=".xlsx" />

<div style="margin:20px 0; display:flex; flex-wrap:wrap; gap:10px;">
<select id="filtroSupervisor"></select>
<select id="filtroAsesor"></select>

<button onclick="filtrarTipo('todos')">Todos</button>
<button onclick="filtrarTipo('top')">Top</button>
<button onclick="filtrarTipo('criticos')">Críticos</button>
<button onclick="filtrarTipo('crecimiento')">Crecimiento</button>
</div>

<div class="container">
<div class="card"><div>Total Abril</div><div id="total"></div></div>
<div class="card"><div>Total Marzo</div><div id="marzo"></div></div>
<div class="card"><div>Variación %</div><div id="variacion"></div></div>
<div class="card"><div>Promedio Abril</div><div id="promedio"></div></div>
<div class="card"><div>Estado</div><div id="estado"></div></div>
</div>

<canvas id="variacionSup"></canvas>
<canvas id="proyeccionSup"></canvas>

<h2>🚨 Alertas</h2>
<ul id="alertas"></ul>

<h2>📋 Ranking</h2>
<table>
<thead>
<tr>
<th>Asesor</th>
<th>Supervisor</th>
<th>Marzo</th>
<th>Abril</th>
<th>Variación %</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script>

let asesores = [];
let dataGlobal = [];

// ==================== CARGA ====================
document.getElementById('fileInput').addEventListener('change', function(e) {

    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(e) {

        let data = new Uint8Array(e.target.result);
        let workbook = XLSX.read(data, {type: 'array'});

        let hoja = workbook.Sheets[workbook.SheetNames[0]];
        let json = XLSX.utils.sheet_to_json(hoja);

        asesores = json.map(f => {

            let marzo = parseInt(f.Marzo);
            let abril = parseInt(f.Abril);

            let variacion = abril - marzo;
            let variacionPorc = marzo > 0 ? (variacion / marzo) * 100 : 0;

            return {
                n: f.Nombre,
                s: f.Supervisor,
                marzo: marzo,
                abril: abril,
                variacion: variacion,
                variacionPorc: variacionPorc
            }
        });

        dataGlobal = [...asesores];

        render(dataGlobal);
        crearFiltros();

    };

    reader.readAsArrayBuffer(file);
});

// ==================== RENDER ====================
function render(data){
    tabla(data);
    kpis(data);
    graficos(data);
    alertas(data);
}

// ==================== TABLA ====================
function tabla(data){
    let tbody = document.getElementById("tabla");
    tbody.innerHTML = "";

    data.sort((a,b)=>b.abril-a.abril);

    data.forEach(a=>{
        let color = a.variacionPorc < 0 ? "red" : "green";

        tbody.innerHTML += `
        <tr>
        <td>${a.n}</td>
        <td>${a.s}</td>
        <td>${a.marzo}</td>
        <td>${a.abril}</td>
        <td class="${color}">${a.variacionPorc.toFixed(1)}%</td>
        </tr>`;
    });
}

// ==================== KPIS ====================
function kpis(data){

    let totalAbril = data.reduce((a,b)=>a+b.abril,0);
    let totalMarzo = data.reduce((a,b)=>a+b.marzo,0);

    let variacion = totalAbril - totalMarzo;
    let porc = totalMarzo>0 ? (variacion/totalMarzo)*100 : 0;

    document.getElementById("total").innerText = totalAbril;
    document.getElementById("marzo").innerText = totalMarzo;
    document.getElementById("variacion").innerHTML = `<span class="${porc>=0?'green':'red'}">${porc.toFixed(1)}%</span>`;
    document.getElementById("promedio").innerText = Math.round(totalAbril/data.length);

    document.getElementById("estado").innerHTML = porc>=0 
        ? "<span class='green'>Crecimiento</span>"
        : "<span class='red'>Caída</span>";
}

// ==================== GRAFICOS ====================
function graficos(data){

    let resumen = {};

    data.forEach(a=>{
        if(!resumen[a.s]) resumen[a.s]={marzo:0,abril:0};
        resumen[a.s].marzo+=a.marzo;
        resumen[a.s].abril+=a.abril;
    });

    let labels = Object.keys(resumen);

    new Chart(document.getElementById('variacionSup'),{
        type:'bar',
        data:{
            labels:labels,
            datasets:[{
                label:'Variación %',
                data:labels.map(s=>{
                    let m=resumen[s].marzo;
                    let a=resumen[s].abril;
                    return m>0 ? ((a-m)/m)*100 : 0;
                })
            }]
        }
    });

    new Chart(document.getElementById('proyeccionSup'),{
        type:'bar',
        data:{
            labels:labels,
            datasets:[{
                label:'Proyección',
                data:labels.map(s=>{
                    let diaria = resumen[s].abril / 15;
                    return Math.round(diaria * 30);
                })
            }]
        }
    });
}

// ==================== ALERTAS ====================
function alertas(data){
    let ul=document.getElementById("alertas");
    ul.innerHTML="";

    data.forEach(a=>{
        if(a.variacionPorc < -20){
            ul.innerHTML+=`<li class="red">🚨 ${a.n} caída fuerte (${a.variacionPorc.toFixed(1)}%)</li>`;
        } else if(a.variacionPorc < 0){
            ul.innerHTML+=`<li class="yellow">⚠️ ${a.n} descenso (${a.variacionPorc.toFixed(1)}%)</li>`;
        }
    });
}

// ==================== FILTROS ====================
function crearFiltros(){

    let sup = [...new Set(asesores.map(a=>a.s))];
    let ase = [...new Set(asesores.map(a=>a.n))];

    let s = document.getElementById("filtroSupervisor");
    let a = document.getElementById("filtroAsesor");

    s.innerHTML="<option value=''>Supervisor</option>";
    a.innerHTML="<option value=''>Asesor</option>";

    sup.forEach(x=>s.innerHTML+=`<option>${x}</option>`);
    ase.forEach(x=>a.innerHTML+=`<option>${x}</option>`);

    s.onchange = aplicarFiltros;
    a.onchange = aplicarFiltros;
}

function aplicarFiltros(){

    let sup=document.getElementById("filtroSupervisor").value;
    let ase=document.getElementById("filtroAsesor").value;

    let filtrado=dataGlobal.filter(x=>{
        return (!sup||x.s===sup)&&(!ase||x.n===ase);
    });

    render(filtrado);
}

// ==================== BOTONES ====================
function filtrarTipo(tipo){

    let data = [...dataGlobal];

    if(tipo==="top"){
        data = data.filter(a=>a.variacionPorc > 10);
    }

    if(tipo==="criticos"){
        data = data.filter(a=>a.variacionPorc < -10);
    }

    if(tipo==="crecimiento"){
        data = data.filter(a=>a.variacionPorc > 0);
    }

    render(data);
}

</script>

</body>
</html>
